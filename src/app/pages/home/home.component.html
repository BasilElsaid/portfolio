<section class="min-h-screen flex items-center justify-center text-center px-6">
  <div class="space-y-6 max-w-2xl">
    <div class="flex justify-center">
      <div class="p-1 rounded-full border border-neutral-200">
        <img
          src="assets/profilePhoto.jpeg"
          alt="Basil Elsaid"
          class="w-36 h-36 rounded-full object-cover"
        />
      </div>
    </div>
    
    <h1 class="text-5xl md:text-7xl font-semibold tracking-tight">
      Ciao, sono Basil
    </h1>

    <p class="text-neutral-500 text-lg leading-relaxed">
      {{ typedText }}<span class="animate-pulse">|</span>
    </p>

    <p class="text-neutral-400 text-sm">
      Java · Spring Boot · NestJS · Angular
    </p>

    <div class="pt-6 flex flex-wrap justify-center items-center gap-6">
      <a
        routerLink="/projects"
        class="px-6 py-3 bg-black text-white rounded-full hover:opacity-90 transition"
      >
        Vedi progetti
      </a>

      <a
        routerLink="/about"
        class="px-6 py-3 border border-neutral-300 rounded-full hover:bg-neutral-100 transition"
      >
        About me
      </a>
    </div>

    <a
      routerLink="/contact"
      class="inline-block mt-6 text-sm text-neutral-500 hover:text-black transition"
    >
      Oppure contattami →
    </a>
  </div>
</section>
